name: creditcard_fraud CI

on:
  push:
    branches: [master, main]
    paths:
      - "creditcard_fraud/**"
      - ".github/workflows/creditcard_fraud.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "creditcard_fraud/**"
      - ".github/workflows/creditcard_fraud.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creditcard_fraud
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('creditcard_fraud/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-cov pip-audit
          pip install -e .

      - name: Lint (flake8)
        run: flake8 --jobs=1 creditcard_fraud tests

      - name: Tests and coverage
        run: pytest --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: creditcard_fraud/coverage.xml

      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Docker build (API image)
        run: docker build -t fraud-api:ci .
