services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri=sqlite:///mlflow.db
      --default-artifact-root=/mlruns
      --host=0.0.0.0
      --port=5000

