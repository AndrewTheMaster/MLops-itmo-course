name: creditcard_fraud

on:
  push:
    paths:
      - "creditcard_fraud/**"
      - ".github/workflows/creditcard_fraud.yml"
  pull_request:
    paths:
      - "creditcard_fraud/**"
      - ".github/workflows/creditcard_fraud.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creditcard_fraud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: creditcard_fraud/requirements.txt
      - run: pip install -U pip && pip install -r requirements.txt && pip install -e .
      - run: python -m pytest tests/pytest -q
      - run: docker build -t fraud-api:ci .
