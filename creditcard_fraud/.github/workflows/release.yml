name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/creditcard-fraud-api

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag version
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Smoke test container
        run: |
          docker run -d --name fraud-api -p 8000:8000 ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          curl --retry 10 --retry-connrefused --retry-delay 2 --fail http://localhost:8000/health
          curl --fail -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"features":{"Time":0.0,"V1":-1.359807,"V2":-0.072781,"V3":2.536347,"V4":1.378155,"V5":-0.338321,"V6":0.462388,"V7":0.239599,"V8":0.098698,"V9":0.363787,"V10":0.090794,"V11":-0.551600,"V12":-0.617801,"V13":-0.991390,"V14":-0.311169,"V15":1.468177,"V16":-0.470401,"V17":0.207971,"V18":0.025791,"V19":0.403993,"V20":0.251412,"V21":-0.018307,"V22":0.277838,"V23":-0.110474,"V24":0.066928,"V25":0.128539,"V26":-0.189115,"V27":0.133558,"V28":-0.021053,"Amount":149.62}}'

      - name: Print container logs on failure
        if: failure()
        run: docker logs fraud-api

      - name: Stop container
        if: always()
        run: docker rm -f fraud-api || true
